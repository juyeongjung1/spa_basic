<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>社員更新・削除Modal</title>
        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
    </head>

    <body class="container py-4">
        <h1>社員一覧</h1>
        <table class="table">
            <thead>
                <tr>
                    <th>顔写真</th>
                    <th>ID</th>
                    <th>氏名</th>
                    <th>給与</th>
                    <th>勤務地</th>
                </tr>
            </thead>
            <tbody id="employeeList"></tbody>
        </table>
        <div class="modal fade" id="detailModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2 class="modal-title fs-5">社員詳細</h2>
                        <button class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <span id="detailId"></span>
                        <span id="detailName"></span>
                        <span id="detailSalary"></span>
                        <span id="detailLocation"></span>
                    </div>
                    <div class="modal-footer">
                        <button
                            class="btn btn-primary"
                            data-bs-toggle="modal"
                            data-bs-target="#updateModal"
                        >
                            編集
                        </button>
                        <button id="deleteBtn" class="btn btn-danger">削除</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal fade" id="updateModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2 class="modal-title fs-5">社員編集</h2>
                        <button class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="updateId" />
                        <label class="d-flex align-items-center gap-2 mb-2">
                            <span style="width: 90px">パスワード</span>
                            <input class="form-control" type="password" id="updatePassword" />
                        </label>
                        <label class="d-flex align-items-center gap-2 mb-2">
                            <span style="width: 90px">氏名</span>
                            <input class="form-control" id="updateName" />
                        </label>
                        <label class="d-flex align-items-center gap-2 mb-2">
                            <span style="width: 90px">給与</span>
                            <input class="form-control" type="number" id="updateSalary" />
                        </label>
                        <label class="d-flex align-items-center gap-2 mb-2">
                            <span style="width: 90px">勤務地</span>
                            <input class="form-control" id="updateLocation" />
                        </label>
                        <label class="d-flex align-items-center gap-2 mb-2">
                            <span style="width: 90px">画像パス</span>
                            <input class="form-control" id="updateImagePath" />
                        </label>
                    </div>
                    <div class="modal-footer">
                        <button id="updateBtn" class="btn btn-primary">更新</button>
                    </div>
                </div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script>
            function showEmployeeList(employees) {
                let list = document.getElementById("employeeList");
                list.innerHTML = "";
                employees.forEach((e) =>
                    list.insertAdjacentHTML(
                        "beforeend",
                        `
                <tr>
                    <td>
                        ${e.image_path ? '<img src="' + e.image_path + '" alt="' + e.name + 'の顔写真" width="48" height="48" style="object-fit: cover" />' : ""}
                    </td>
                    <td>${e.id}</td>
                    <td>
                        <a href="#" onclick="showEmployeeDetail(${e.id}); return false;">
                            ${e.name}
                        </a>
                    </td>
                    <td>${e.salary}</td>
                    <td>${e.location_name}</td>
                </tr>
            `,
                    ),
                );
            }

            function showEmployeeDetail(id) {
                axios.get(`http://localhost:3005/api/employees/${id}`).then((response) => {
                    let e = response.data;
                    document.getElementById("detailId").innerHTML = e.id;
                    document.getElementById("detailName").innerHTML = e.name;
                    document.getElementById("detailSalary").innerHTML = e.salary;
                    document.getElementById("detailLocation").innerHTML = e.location_name;
                    // 【手順1】更新Modalへ現在の社員情報を設定してください。
                    // updateIdには必ず社員番号を入れます。パスワードは空欄にし、氏名、給与、勤務地、画像パスを設定してください。
                    _____;
                    new bootstrap.Modal(document.getElementById("detailModal")).show();
                });
            }
            document.getElementById("updateBtn").addEventListener("click", function () {
                // 【手順2】更新入力値を取得し、PUT http://localhost:3005/api/employees/${id} へ送信してください。
                _____;
                // 【手順3】成功後に一覧を再描画し、updateModalを閉じてください。
                _____;
            });
            document.getElementById("deleteBtn").addEventListener("click", function () {
                // 【手順4】detailIdから社員番号を取得し、DELETE http://localhost:3005/api/employees/${id} を呼び出してください。
                _____;
                // 【手順5】成功後に一覧を再描画し、detailModalを閉じてください。
                _____;
            });
            document.addEventListener("DOMContentLoaded", () =>
                axios
                    .get("http://localhost:3005/api/employees")
                    .then((r) => showEmployeeList(r.data)),
            );
        </script>
    </body>
</html>
