                    <th>勤務地</th>

            </thead>
            <tbody id="employeeList"></tbody>
        </table>
        <script>
            function deleteEmployee(id) {
                // 確認ダイアログでキャンセルされた場合は処理を終了します。

                }
                // 【手順2】DELETE http://localhost:3005/api/employees/${id} を呼び出してください。

                        _____;
                    })
                    .catch((error) => console.error("社員削除に失敗しました:", error));

            function showEmployeeList(employees) {

                        `
                <tr>
                    <td>${e.image_path ? "<img src=\"" + e.image_path + "\" alt=\"" + e.name + "の顔写真\" width=\"48\" height=\"48\" style=\"object-fit: cover\" />" : ""}</td>

                    <td>${e.salary}</td>
                    <td>${e.location_name}</td>
                    <td>
                        <!-- 【手順1】削除ボタンから、削除対象の社員番号をdeleteEmployeeへ渡してください。 -->
                        <button onclick="_____">削除</button>
                    </td>
                </tr>
            `,
                    ),
                );
            }
            document.addEventListener("DOMContentLoaded", () =>
                axios
                    .get("http://localhost:3005/api/employees")
                    .then((r) => showEmployeeList(r.data)),
            );
        </script>
