<!doctype html>
<html lang="ja">
    <head>

        <title>classList</title>
        <style>
            .status {
                padding: 12px;
                background: #eee;
                color: #555;
            }

            /* 【手順1】在席中のclass名workingを指定してください。 */
            ._____ {
                background: #d1e7dd;
                color: #0f5132;
                font-weight: bold;

    </head>

        <button id="toggleBtn">状態切替</button>
        <script>
            let target = document.getElementById("workStatus");
            document.getElementById("workStartBtn").addEventListener("click", function () {
                // 【手順2】workingクラスを追加してください。
                _____;
            });
            document.getElementById("workEndBtn").addEventListener("click", function () {
                // 【手順3】workingクラスを削除してください。
                _____;
            });
            document.getElementById("toggleBtn").addEventListener("click", function () {
                // 【手順4】workingクラスを付け外ししてください。
                _____;
            });
        </script>
    </body>
</html>
