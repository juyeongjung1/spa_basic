<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>人事管理SPA</title>
        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
        <style>
            body {
                margin: 0;
                font-family: sans-serif;
            }

            header,
            footer {
                background: #0f766e;
                color: white;
                padding: 16px;
            }

            nav a {
                color: white;
                margin-right: 16px;
                text-decoration: none;
                font-weight: bold;
            }

            nav a:hover {
                color: #ccfbf1;
                text-decoration: underline;
            }

            footer {
                background: #1f2937;
            }

            main {
                padding: 24px;
            }

            table {
                border-collapse: collapse;
            }

            th,
            td {
                border: 1px solid #aaa;
                padding: 8px;
            }
        </style>
    </head>

    <body>
        <header>
            <h1>人事管理システム</h1>
            <nav>
                <a href="/">ホーム</a>
                <a href="/employees">社員一覧</a>
                <a href="/employees/new">新規社員登録</a>
                <a href="/about">このシステムについて</a>
            </nav>
        </header>
        <main id="app"></main>
        <footer>人事管理システム</footer>
        <script>
            // 【手順1】初期表示時、現在のpathnameをshowPageへ渡してください。
            document.addEventListener("DOMContentLoaded", function () {
                _____;
            });
            // 【手順2】Navigation APIのnavigateイベントを登録してください。
            navigation.addEventListener(_____, function (event) {
                // 【手順3】移動先URLをURLオブジェクトへ変換してください。
                let url = _____;
                // 【手順4】intercept不能または別オリジンなら処理を終了してください。
                _____;
                // 【手順5】通常遷移を置き換え、移動先pathnameをshowPageへ渡してください。
                event.intercept({
                    handler: function () {
                        _____;
                    },
                });
            });

            function showPage(path) {
                if (path === "/" || path === "/index.html") {
                    showHome();
                    return;
                }
                if (path === "/employees" || path === "/employees/") {
                    showEmployeeList();
                    return;
                }
                if (path === "/employees/new" || path === "/employees/new/") {
                    showEmployeeRegister();
                    return;
                }
                // 【手順6】/employees/1001の社員番号を正規表現で取り出してください。
                let result = _____;
                if (result) {
                    showEmployeeDetail(result[1]);
                    return;
                }
                // 【手順7】/aboutの場合にshowAboutを呼び出してください。
                _____;
                // 【手順8】該当しないパスと、ホーム・社員一覧へのリンクを含む404画面を表示してください。
                _____;
            }

            function showHome() {
                document.getElementById("app").innerHTML =
                    "<h2>ホーム</h2><p>メニューから社員情報を管理できます。</p>";
            }

            function showEmployeeRegister() {
                document.getElementById("app").innerHTML =
                    "<h2>新規社員登録</h2><p>この演習では画面遷移を確認します。</p>";
            }

            function showAbout() {
                document.getElementById("app").innerHTML =
                    "<h2>このシステムについて</h2><p>使用技術：JavaScript、Express、SQLite、Axios</p>";
            }

            function showEmployeeList() {
                axios.get("http://localhost:3005/api/employees").then((r) => {
                    let rows = "";
                    r.data.forEach(
                        (e) =>
                            (rows += `
                    <tr>
                        <td>${e.image_path ? '<img src="' + e.image_path + '" alt="' + e.name + 'の顔写真" width="48" height="48" style="object-fit: cover" />' : ""}</td>
                        <td>${e.id}</td>
                        <td><a href="/employees/${e.id}">${e.name}</a></td>
                        <td>${e.salary}</td>
                        <td>${e.location_name}</td>
                    </tr>
                `),
                    );
                    document.getElementById("app").innerHTML =
                        `<h2>社員一覧</h2><table><thead><tr><th>顔写真</th><th>ID</th><th>氏名</th><th>給与</th><th>勤務地</th></tr></thead><tbody>${rows}</tbody></table>`;
                });
            }

            function showEmployeeDetail(id) {
                axios.get(`http://localhost:3005/api/employees/${id}`).then((r) => {
                    let e = r.data;
                    document.getElementById("app").innerHTML = `
                    <h2>社員詳細</h2>
                    ${e.image_path ? '<p><img src="' + e.image_path + '" alt="' + e.name + 'の顔写真" width="120" style="object-fit: cover" /></p>' : ""}
                    <p>${e.id} ${e.name} ${e.salary}円 ${e.location_name}</p>
                    <a href="/employees">一覧へ戻る</a>
                `;
                });
            }
        </script>
    </body>
</html>
