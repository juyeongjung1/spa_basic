<!DOCTYPE html>
<html lang="jp">
<head>
    <title>商品管理システム</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light p-4">
    <div class="container"> <!-- START container -->
        <div class="row"> <!-- START row 1 -->
            <div class="col-md-4">
                <h1 class="mb-4 text-nowrap">商品管理システム</h1> <!-- タイトル -->

                <!-- 商品検索セクション -->
                <div class="mb-4">
                    <div class="row g-2">
                        <div class="col-8">
                            <input type="text" class="form-control" id="searchName" placeholder="商品名">
                        </div>
                        <div class="col-4">
                            <button class="btn btn-primary" id="searchBtn">検索</button>
                        </div>
                    </div>
                </div>
            </div> <!-- END col-md-4 -->
        </div> <!-- END row 1 -->

        <!-- 商品一覧テーブル -->
        <div class="row"> <!-- START row 2 -->
            <div class="col-8">
                <table class="table table-striped table-bordered table-hover table-sm text-nowrap">
                    <thead class="table-dark text-center">
                        <tr>
                            <th>商品番号</th>
                            <th>商品名</th>
                            <th>価格</th>
                        </tr>
                    </thead>
                    <tbody id="product_list">
                        <!--ここにデータが挿入されます-->
                    </tbody>
                </table>
            </div> <!-- END col-8 -->
        </div> <!-- END row 2 -->

        <!-- 新規商品登録ボタン -->
        <div class="row mt-3"> <!-- START row 3 -->
            <div class="col-4">
                <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#registerModal">新規商品登録</button>
            </div>
        </div> <!-- END row 3 -->
    </div> <!-- END container -->

    <!-- Modal -->
    <div class="modal fade" id="registerModal" tabindex="-1" > <!-- START Modal -->
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="registerModalLabel">新規商品登録</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="inputName" class="form-label">商品名</label>
                        <input type="text" class="form-control" id="inputName" placeholder="商品名">
                    </div>
                    <div class="mb-3">
                        <label for="inputPrice" class="form-label">価格</label>
                        <input type="number" class="form-control" id="inputPrice" placeholder="価格">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">閉じる</button>
                    <button type="button" class="btn btn-primary" id="registBtn">登録</button>
                </div>
            </div>
        </div>
    </div> <!-- END Modal -->

    <script>
    document.getElementById('registBtn').addEventListener('click', function() {
        let name = document.getElementById('inputName').value;
        let price = document.getElementById('inputPrice').value;

        axios.post('http://localhost:8080/api/v333/products', {
            name: name,
            price: price
        })
        .then(response => {
            alert('商品が登録されました');
            showProductList(response.data);
            var modal = bootstrap.Modal.getInstance(document.getElementById('registerModal'));
            modal.hide();
        })
        .catch(error => console.error('商品登録に失敗しました:', error));
    });

    //==========＜商品名検索機能＞==========
    document.getElementById('searchBtn').addEventListener('click', function() {
        let name = document.getElementById('searchName').value;
        axios.get(`http://localhost:8080/api/v332/products/${name}`)
        .then(response => {
            showProductList(response.data);
        })
        .catch(error => console.error('エラーが発生しました:', error));
    });

    //==========＜商品リスト表示機能＞==========
    document.addEventListener('DOMContentLoaded', function() {
        axios.get('http://localhost:8080/api/v332/products')
        .then(response => {
            showProductList(response.data);
        })
        .catch(error => console.error('エラーが発生しました:', error));
    });

    //商品リストを表示する関数
    function showProductList(products) {
        let productList = document.getElementById('product_list');
        productList.innerHTML = ''; //既存のテーブルデータを初期化

        products.forEach(product => {
            let productHtml = `
            <tr>
                <td>${product.id}</td>
                <td>${product.name}</td>
                <td>${product.price}</td>
            </tr>`;
            productList.insertAdjacentHTML('beforeend', productHtml);
        });
    }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
