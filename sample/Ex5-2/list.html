<!DOCTYPE html>
<html>
    <head>
        <title>初期画面</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script
            src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
        <meta charset="UTF-8">
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet">
    </head>

    <body>
        <div class="container">

            <div class="row justify-content-center mt-5 ">
                <div class="col-md-4 table-responsive">
                    <div class="fw-bold fs-3">商品一覧</div>
                    <table
                        class="table table-striped table-bordered table-hover table-sm text-nowrap">
                        <thead class="text-center table-dark">
                            <tr>
                                <th>商品番号</th>
                                <th>商品名</th>
                                <th>価格</th>
                            </tr>
                        </thead>
                        <tbody id="product_list">
                            <!--ここにデータが挿入されます-->
                        </tbody>
                    </table>
                </div><!-- END table col-4-->
            </div><!-- END table-responsive-->
        </div> <!--END container-->
        <script>
document.addEventListener('DOMContentLoaded', function() {
    axios.get('http://localhost:8080/api/v331/products')

//【作業手順➂】はこの下のコードからです
.then(response => {
    showProductList(response.data);
})
.catch(error => console.error('エラーが発生しました:', error));
});

//商品リストを表示する関数
function showProductList(products){
    let productList = document.getElementById('product_list');
    productList.innerHTML = ''; //既存のテーブルデータを初期化

    products.forEach(product => {
        let productHtml = `
        <tr>
            <td>${product.id}<td>${product.name}</td><td>${product.price}</td>
        </tr>`;
        productList.insertAdjacentHTML('beforeend', productHtml);
    });
}
</script>
    </body>
</html>
