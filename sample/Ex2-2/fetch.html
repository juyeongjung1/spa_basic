<!DOCTYPE html>
<html>
<head>
    <title>fetch</title>
</head>
<body>
  <h1 id = "showTime">時間はここに表示されます。</h1>
  <button id="clockBtn">APIから現在時間を取得</button>
  
<script>

document.getElementById('clockBtn').addEventListener('click', function() {
    let result = document.getElementById('showTime'); 

fetch('http://localhost:3002/currenttime') // ➀　現在の時間を取得するAPIのURL
  .then(response => response.json()) // ➁レスポンスボディをJSONとして解析
  .then(data => { 
    console.log(data);
    result.innerHTML = data.time; //➂既存のコンテンツをjsonのdataファイルのtime変数に変えます。
  }) 
  .catch(error => console.error('エラーが発生しました:', error)); 
});

</script>
</body>
</html>
