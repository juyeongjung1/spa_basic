<!DOCTYPE html>
<html>
<head>
    <title>初期画面</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <meta charset="UTF-8">
</head>

<body>
    <table>
        <thead>
            <tr>
                <th>商品番号</th>
                <th>商品名</th>
                <th>価格</th>
                <th>カテゴリ</th>
            </tr>
        </thead>
        <tbody id="product_list">
            <!--ここにデータが挿入されます-->
        </tbody>
    </table>
    
<script>
document.addEventListener('DOMContentLoaded', function() {
    axios.get('http://localhost:3005/api/v331/products')

//【作業手順➂】はこの下のコードからです
.then(response => {
    showProductList(response.data);
})
.catch(error => console.error('エラーが発生しました:', error));
});

//商品リストを表示する関数
function showProductList(products){
    let productList = document.getElementById('product_list');
    productList.innerHTML = ''; //既存のテーブルデータを初期化

    products.forEach(product => {
        let productHtml = `
        <tr>
            <td>${product.id}</td><td>${product.name}</td><td>${product.price}</td><td>${product.category}</td>
        </tr>`;
        productList.insertAdjacentHTML('beforeend', productHtml);
    });
}
</script>
</body>
</html>
