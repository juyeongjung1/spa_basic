<!DOCTYPE html>
<html>
<head>
    <title>初期画面</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <meta charset="UTF-8">
</head>

<body>
    <h1>商品管理システム</h1>
    <input type = "text" id = "searchName" placeholder="商品名">
    <button id = "searchBtn">検索</button>
    <table>
        <thead>
            <tr>
                <th>商品番号</th>
                <th>商品名</th>
                <th>価格</th>
                <th>カテゴリ</th>
            </tr>
        </thead>
        <tbody id="product_list">
            <!--ここにデータが挿入されます-->
        </tbody>
    </table>

    <h2>データ登録</h2>
    商品名：<input type = "text" id = "inputName"><br>
    価　格：<input type = "number" id = "inputPrice"><br>
    <button id = "registBtn">登録</button>

<script>
document.getElementById('registBtn').addEventListener('click', function() {
    let name = document.getElementById('inputName').value;
    let price = document.getElementById('inputPrice').value;

    axios.post('http://localhost:3005/api/v333/products', {
        name: name,
        price: price
    })
    .then(response => {
        alert('商品が登録されました');
        showProductList(response.data);
        let modal = document.getElementById('registerModal');
        let modalInstance = bootstrap.Modal.getInstance(modal);
        modalInstance.hide();
    })
    .catch(error => console.error('商品登録に失敗しました:', error));
});

//==========＜商品名検索機能＞==========
document.getElementById('searchBtn').addEventListener('click', function() {
    let name = document.getElementById('searchName').value;
    axios.get(`http://localhost:3005/api/v332/products/${name}`)
    .then(response => {
        showProductList(response.data);
    })
    .catch(error => console.error('エラーが発生しました:', error));
});

//==========＜商品リスト表示機能＞==========
document.addEventListener('DOMContentLoaded', function() {
    axios.get('http://localhost:3005/api/v332/products')
    .then(response => {
        showProductList(response.data);
    })
    .catch(error => console.error('エラーが発生しました:', error));
});

//商品リストを表示する関数
function showProductList(products) {
    let productList = document.getElementById('product_list');
    productList.innerHTML = ''; //既存のテーブルデータを初期化

    products.forEach(product => {
        let productHtml = `
        <tr id="row-${product.id}">
            <td>${product.id}</td>
            <td id="name-${product.id}">${product.name}</td>
            <td id="price-${product.id}">${product.price}</td> 
            <td id="category-${product.id}">${product.category}</td>
            <td><button onclick="editProduct(${product.id})">更新</button></td>
            <td><button onclick="deleteProduct(${product.id})">削除</button></td>
        </tr>`;
        productList.insertAdjacentHTML('beforeend', productHtml);
    });
}

function editProduct(productId) {
    let row = document.getElementById(`row-${productId}`);
    let name = document.getElementById(`name-${productId}`).textContent;
    let price = document.getElementById(`price-${productId}`).textContent;
    let category = document.getElementById(`category-${productId}`).textContent;

    let editHtml = `
    <td>${productId}</td>
    <td><input type='text' value='${name}' id='edit-name-${productId}'></td>
    <td><input type='number' value='${price}' id='edit-price-${productId}'></td>
    <td>${category}</td>
    <td><button onclick="saveProduct(${productId})">保存</button></td>
    <td><button onclick="cancelEdit(${productId})">キャンセル</button></td>`; 
    row.innerHTML = editHtml; 
}
function saveProduct(productId) { 
    let newName = document.getElementById(`edit-name-${productId}`).value;
    let newPrice = document.getElementById(`edit-price-${productId}`).value;
    axios.put(`http://localhost:3005/api/v335/products/${productId}`, {
        name: newName,
        price: newPrice
    }) 
    .then(response => {
        alert('商品が更新されました');
        showProductList(response.data); // 更新後の商品リストを再表示
    })
    .catch(error => console.error('商品更新に失敗しました:', error));
}

function cancelEdit() {
    axios.get('http://localhost:3005/api/v335/products')
    .then(response => {
        showProductList(response.data);
    })
    .catch(error => console.error('エラーが発生しました:', error));
}



//削除機能のための関数
function deleteProduct(id) {
    axios.delete(`http://localhost:3005/api/v335/products/${id}`)
        .then(response => {
            alert('削除が完了しました');
            showProductList(response.data);
        })
        .catch(error => {
            console.error('削除エラーが発生しました:', error);
        });
}


</script>
</body>
</html>
