<!DOCTYPE html>
<html>
<head>
    <title>商品登録</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <meta charset="UTF-8">
</head>
<body>
    <h1>商品管理システム</h1>
    <!-- 検索条件を入力するフォームと、検索・一覧表示ボタンです。 -->
    <input type="text" id="searchName" placeholder="商品名">
    <button id="searchBtn">検索</button>
    <button id="listBtn">一覧表示</button>
    <!-- APIから取得した商品データを表示するテーブルです。 -->
    <table>
        <thead>
            <tr>
                <th>商品番号</th>
                <th>商品名</th>
                <th>価格</th>
                <th>カテゴリ</th>
            </tr>
        </thead>
        <!-- JavaScriptからtbodyを選択できるように、id属性を指定しています。 -->
        <tbody id="product_list">
            <!--ここにデータが挿入されます-->
        </tbody>
    </table>

    <!-- 【作業手順➀】商品登録用の入力フォームです。 -->
    <h2>データ登録</h2>
    <p id="errorMessage"></p>
    商品名：<input type="text" id="inputName"><br>
    価　格：<input type="number" id="inputPrice"><br>
    カテゴリ：
    <select id="inputCategory">
        <option value="電子機器">電子機器</option>
        <option value="家具">家具</option>
        <option value="文房具">文房具</option>
        <option value="食品">食品</option>
        <option value="未分類">未分類</option>
    </select><br>
    <button id="registBtn">登録</button>

<script>
// 登録ボタンをクリックした時に、商品登録APIを呼び出します。
document.getElementById('registBtn').addEventListener('click', function() {
    // 入力フォームから、商品名・価格・カテゴリを取得します。
    let name = document.getElementById('inputName').value;
    let price = document.getElementById('inputPrice').value;
    let category = document.getElementById('inputCategory').value;
    let errorMessage = document.getElementById('errorMessage');

    errorMessage.innerHTML = '';

    // 未入力の項目がある場合は、APIへ送信せずにメッセージを表示します。
    if (!name || !price || !category) {
        errorMessage.innerHTML = 'データを入力してください。';
        return;
    }

    // POST方式で、登録したい商品データをAPIへ送信します。
    axios.post('http://localhost:3005/api/v34/products', {
        name: name,
        price: price,
        category: category
    })
    .then(response => {
        alert('商品が登録されました');
        errorMessage.innerHTML = '';
        // 登録後にAPIから返ってきた最新の商品一覧を表示し直します。
        showProductList(response.data);
    })
    .catch(error => {
        if (error.response && error.response.status === 400) {
            errorMessage.innerHTML = 'データを入力してください。';
            return;
        }

        console.error('商品登録に失敗しました:', error);
    });
});

// 画面を開いた時に、まず商品一覧を取得して表示します。
document.addEventListener('DOMContentLoaded', function() {
    axios.get('http://localhost:3005/api/v34/products')
    .then(response => {
        showProductList(response.data);
    })
    .catch(error => console.error('エラーが発生しました:', error));
});

// 検索ボタンをクリックした時に、商品名をキーワードとしてAPIへ送信します。
document.getElementById('searchBtn').addEventListener('click', function() {
    let name = document.getElementById('searchName').value;

    // keywordクエリパラメータを付けることで、商品名の部分一致検索を行います。
    axios.get(`http://localhost:3005/api/v34/products?keyword=${name}`)
    .then(response => {
        showProductList(response.data);
    })
    .catch(error => console.error('エラーが発生しました:', error));
});

// 一覧表示ボタンをクリックした時に、検索条件なしで商品一覧を取得します。
document.getElementById('listBtn').addEventListener('click', function() {
    axios.get('http://localhost:3005/api/v34/products')
    .then(response => {
        showProductList(response.data);
    })
    .catch(error => console.error('エラーが発生しました:', error));
});

// APIから受け取った商品リストを、テーブルのtbodyへ表示する関数です。
function showProductList(products){
    let productList = document.getElementById('product_list');
    // すでに表示されている行を消してから、新しい検索結果を表示します。
    productList.innerHTML = '';

    // products配列のデータを1件ずつ取り出し、trタグを作成します。
    products.forEach(product => {
        let productHtml = `
        <tr>
            <td>${product.id}</td><td>${product.name}</td><td>${product.price}</td><td>${product.category}</td>
        </tr>`;
        // 作成したHTMLをtbodyの末尾へ追加します。
        productList.insertAdjacentHTML('beforeend', productHtml);
    });
}
</script>
</body>
</html>
