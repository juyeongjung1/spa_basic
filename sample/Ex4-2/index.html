<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modalの基本</title>

    <!-- BootstrapのCSSを読み込みます。 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <h1>Modalの基本</h1>

    <!-- data-bs-targetには、開きたいModalのidを指定します。 -->
    <button type="button" data-bs-toggle="modal" data-bs-target="#exampleModal">
        Modalを開く
    </button>

    <!-- ここからBootstrapのModalです。 -->
    <div class="modal fade" id="exampleModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Modalのタイトル</h5>
                    <button type="button" data-bs-dismiss="modal">閉じる</button>
                </div>

                <div class="modal-body">
                    ここにModalの内容を表示します。
                </div>

                <div class="modal-footer">
                    <button type="button" data-bs-dismiss="modal">閉じる</button>
                </div>

            </div>
        </div>
    </div>
    <!-- ここまでBootstrapのModalです。 -->

    <!-- BootstrapのJavaScriptを読み込みます。 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
