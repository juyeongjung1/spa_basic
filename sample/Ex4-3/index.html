<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History APIを使った商品管理システム</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <header class="bg-primary text-white p-3">
        <div class="container">
            <h1 class="fs-3 mb-0">商品管理システム</h1>
        </div>
    </header>

    <!-- URLに対応する画面を、この要素の中へ表示します。 -->
    <main id="app" class="container py-4"></main>

    <script>
    //【作業手順➀】最初に、現在のURLに対応する画面を表示します。
    document.addEventListener('DOMContentLoaded', function() {
        showPage();
    });

    //【作業手順➁】URLを変更してから、変更後の画面を表示します。
    function movePage(path) {
        history.pushState({}, '', path);
        showPage();
    }

    //【作業手順③】現在のURLを確認し、表示する画面を決めます。
    function showPage() {
        let path = window.location.pathname;

        if (path === '/') {
            showProductList();
            return;
        }

        // /products/3 の「3」に当たる商品番号を取り出します。
        let result = path.match(/^\/products\/(\d+)$/);

        if (result) {
            showProductDetail(result[1]);
            return;
        }

        document.getElementById('app').innerHTML = `
            <h2>ページが見つかりません</h2>
            <button class="btn btn-primary" onclick="movePage('/')">
                商品一覧へ戻る
            </button>`;
    }

    // 商品一覧APIを呼び出し、一覧画面を表示します。
    function showProductList() {
        axios.get('/api/v43/products')
        .then(response => {
            let rows = '';

            response.data.forEach(product => {
                rows += `
                    <tr>
                        <td>${product.id}</td>
                        <td>
                            <a href="/products/${product.id}"
                               onclick="movePage('/products/${product.id}'); return false;">
                                ${product.name}
                            </a>
                        </td>
                        <td>${product.price}</td>
                        <td>${product.category}</td>
                    </tr>`;
            });

            document.getElementById('app').innerHTML = `
                <h2 class="mb-3">商品一覧</h2>
                <p>商品名をクリックすると、再読み込みせずに詳細画面へ移動します。</p>
                <table class="table table-bordered bg-white">
                    <thead class="table-dark">
                        <tr>
                            <th>商品番号</th>
                            <th>商品名</th>
                            <th>価格</th>
                            <th>カテゴリ</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>`;
        })
        .catch(error => console.error('商品一覧の取得に失敗しました:', error));
    }

    // 商品詳細APIを呼び出し、詳細画面を表示します。
    function showProductDetail(id) {
        axios.get(`/api/v43/products/${id}`)
        .then(response => {
            let product = response.data;

            document.getElementById('app').innerHTML = `
                <h2 class="mb-3">商品詳細</h2>
                <table class="table table-bordered bg-white">
                    <tr><th>商品番号</th><td>${product.id}</td></tr>
                    <tr><th>商品名</th><td>${product.name}</td></tr>
                    <tr><th>価格</th><td>${product.price}</td></tr>
                    <tr><th>カテゴリ</th><td>${product.category}</td></tr>
                </table>
                <button class="btn btn-secondary" onclick="movePage('/')">
                    商品一覧へ戻る
                </button>`;
        })
        .catch(error => {
            document.getElementById('app').innerHTML = `
                <p>商品情報を取得できませんでした。</p>
                <button class="btn btn-primary" onclick="movePage('/')">
                    商品一覧へ戻る
                </button>`;
            console.error('商品詳細の取得に失敗しました:', error);
        });
    }

    //【作業手順➃】ブラウザの「戻る・進む」が押された時も、URLに対応する画面を表示します。
    window.addEventListener('popstate', function() {
        showPage();
    });
    </script>
</body>
</html>
