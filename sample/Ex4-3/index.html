<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation APIを使った商品管理システム</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <header class="bg-primary text-white p-3">
        <div class="container">
            <h1 class="fs-3 mb-0">商品管理システム</h1>
        </div>
    </header>

    <!-- URLに対応する画面を、この要素の中へ表示します。 -->
    <main id="app" class="container py-4"></main>

    <script>
    //【作業手順➀】最初に、現在のURLに対応する画面を表示します。
    document.addEventListener('DOMContentLoaded', function() {
        showPage(window.location.pathname);
    });

    //【作業手順➁】ページ移動が発生した時に、Navigation APIで処理します。
    navigation.addEventListener('navigate', function(event) {
        let url = new URL(event.destination.url);

        // このWebサイト内の、処理を置き換えられるページ移動だけを対象にします。
        if (!event.canIntercept || url.origin !== window.location.origin) {
            return;
        }

        // 通常のページ移動を止め、URLに対応する画面だけを表示します。
        event.intercept({
            handler: function() {
                return showPage(url.pathname);
            }
        });
    });

    //【作業手順③】URLを確認し、表示する画面を決めます。
    function showPage(path) {

        if (path === '/') {
            return showProductList();
        }

        // /products/3 の「3」に当たる商品番号を取り出します。
        let result = path.match(/^\/products\/(\d+)$/);

        if (result) {
            return showProductDetail(result[1]);
        }

        document.getElementById('app').innerHTML = `
            <h2>ページが見つかりません</h2>
            <a href="/" class="btn btn-primary">
                商品一覧へ戻る
            </a>`;
    }

    // 商品一覧APIを呼び出し、一覧画面を表示します。
    function showProductList() {
        return axios.get('/api/v43/products')
        .then(response => {
            let rows = '';

            response.data.forEach(product => {
                rows += `
                    <tr>
                        <td>${product.id}</td>
                        <td>
                            <a href="/products/${product.id}">
                                ${product.name}
                            </a>
                        </td>
                        <td>${product.price}</td>
                        <td>${product.category}</td>
                    </tr>`;
            });

            document.getElementById('app').innerHTML = `
                <h2 class="mb-3">商品一覧</h2>
                <p>商品名をクリックすると、再読み込みせずに詳細画面へ移動します。</p>
                <table class="table table-bordered bg-white">
                    <thead class="table-dark">
                        <tr>
                            <th>商品番号</th>
                            <th>商品名</th>
                            <th>価格</th>
                            <th>カテゴリ</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>`;
        })
        .catch(error => console.error('商品一覧の取得に失敗しました:', error));
    }

    // 商品詳細APIを呼び出し、詳細画面を表示します。
    function showProductDetail(id) {
        return axios.get(`/api/v43/products/${id}`)
        .then(response => {
            let product = response.data;

            document.getElementById('app').innerHTML = `
                <h2 class="mb-3">商品詳細</h2>
                <table class="table table-bordered bg-white">
                    <tr><th>商品番号</th><td>${product.id}</td></tr>
                    <tr><th>商品名</th><td>${product.name}</td></tr>
                    <tr><th>価格</th><td>${product.price}</td></tr>
                    <tr><th>カテゴリ</th><td>${product.category}</td></tr>
                </table>
                <a href="/" class="btn btn-secondary">
                    商品一覧へ戻る
                </a>`;
        })
        .catch(error => {
            document.getElementById('app').innerHTML = `
                <p>商品情報を取得できませんでした。</p>
                <a href="/" class="btn btn-primary">
                    商品一覧へ戻る
                </a>`;
            console.error('商品詳細の取得に失敗しました:', error);
        });
    }

    </script>
</body>
</html>
