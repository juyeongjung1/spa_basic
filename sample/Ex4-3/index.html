<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation APIを使った商品管理システム</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* ページ全体の外側の余白をなくし、薄い灰色の背景にします。 */
        body {
            margin: 0;
            background-color: #f5f5f5;
        }

        /* ヘッダー内のシステム名と三本線ボタンを横並びにします。 */
        .site-header {
            /* display: flexを指定すると、子要素が横並びになります。 */
            display: flex;
            /* 2つの要素をヘッダーの左右に分けて配置します。 */
            justify-content: space-between;
            /* 要素の高さが違っても、上下の中央を揃えます。 */
            align-items: center;
            padding: 16px 24px;
            color: white;
            background-color: #0d6efd;
        }

        /* ヘッダーに表示するシステム名の見た目を設定します。 */
        .site-title {
            color: white;
            font-size: 24px;
            /* リンクの下線を消します。 */
            text-decoration: none;
        }

        /* サイドバーとメイン画面を横並びにします。 */
        .layout {
            display: flex;
            /* 画面が小さくても、ある程度の高さを確保します。 */
            min-height: 75vh;
        }

        /* PC画面の左側に表示するサイドバーです。 */
        .sidebar {
            width: 220px;
            padding: 24px;
            background-color: white;
            border-right: 1px solid #cccccc;
        }

        /* サイドバーのリンクを、縦に並ぶメニューとして表示します。 */
        .sidebar a {
            /* リンクを横幅いっぱいに広げます。 */
            display: block;
            padding: 10px;
            color: #333333;
            text-decoration: none;
        }

        /* マウスを重ねたメニューの背景色を変更します。 */
        .sidebar a:hover {
            background-color: #eeeeee;
        }

        /* URLに対応したホーム・一覧・詳細を表示する場所です。 */
        .main-content {
            /* サイドバーを除いた残りの横幅をすべて使用します。 */
            flex: 1;
            /* テーブルがある場合でも、画面からはみ出しにくくします。 */
            min-width: 0;
            padding: 24px;
        }

        /* 各画面の見出しの上下の余白を設定します。 */
        .page-title {
            margin-top: 0;
            margin-bottom: 16px;
        }

        /* ホーム画面の説明を、白い枠の中に表示します。 */
        .welcome-box {
            padding: 24px;
            background-color: white;
            border: 1px solid #cccccc;
        }

        /* 白い枠の先頭に余分な空白ができないようにします。 */
        .welcome-box h2 {
            margin-top: 0;
        }

        /* 商品一覧と商品詳細で使用するテーブルです。 */
        .product-table {
            width: 100%;
            margin-top: 16px;
            margin-bottom: 16px;
            background-color: white;
            /* 隣り合うセルの枠線を1本にまとめます。 */
            border-collapse: collapse;
        }

        /* テーブルの見出しとデータに、内側の余白と枠線を付けます。 */
        .product-table th,
        .product-table td {
            padding: 10px;
            border: 1px solid #999999;
        }

        /* テーブルの見出しだけ、背景を黒くして文字を白くします。 */
        .product-table th {
            color: white;
            background-color: #333333;
        }

        /* タブレット端末以下で開くメニューのリンクを縦に並べます。 */
        .mobile-menu-links a {
            display: block;
            padding: 10px;
            text-decoration: none;
        }

        /* 画面の一番下に表示するフッターです。 */
        .site-footer {
            padding: 16px;
            color: white;
            text-align: center;
            background-color: #212529;
        }

        /* PCでは三本線ボタンを表示しません。 */
        .mobile-menu-button {
            display: none;
        }

        /* 【参考】画面幅が768px以下の場合だけ、この中のCSSを適用します。 */
        @media (max-width: 768px) {
            /* 狭い画面では、PC用のサイドバーを非表示にします。 */
            .sidebar {
                display: none;
            }

            /* 代わりに、三本線のメニューボタンを表示します。 */
            .mobile-menu-button {
                display: block;
            }

            /* 狭い画面に合わせて、メイン画面の余白を少し小さくします。 */
            .main-content {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- ヘッダーは、画面を移動しても表示したままにします。 -->
    <header class="site-header">
        <a href="/" class="site-title">商品管理システム</a>
        <button class="btn btn-outline-light mobile-menu-button" type="button"
                data-bs-toggle="offcanvas" data-bs-target="#mobileMenu">
            ☰
        </button>
    </header>

    <div class="layout">
        <!-- PCで表示する共通サイドバーです。 -->
        <aside class="sidebar">
            <h2>メニュー</h2>
            <nav>
                <a href="/">ホーム</a>
                <a href="/products">商品一覧</a>
                <a href="/register">商品登録</a>
            </nav>
        </aside>

        <!-- URLに対応するメイン画面だけを、この要素の中へ表示します。 -->
        <main id="app" class="main-content"></main>
    </div>

    <!-- 【参考】タブレット端末以下で、三本線ボタンから開くメニューです。 -->
    <div class="offcanvas offcanvas-start" tabindex="-1" id="mobileMenu">
        <div class="offcanvas-header">
            <h2 class="offcanvas-title">メニュー</h2>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <nav class="mobile-menu-links">
                <a href="/">ホーム</a>
                <a href="/products">商品一覧</a>
                <a href="/register">商品登録</a>
            </nav>
        </div>
    </div>

    <!-- フッターも、画面を移動しても表示したままにします。 -->
    <footer class="site-footer">
        商品管理システム
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    //【作業手順➀】最初に、現在のURLに対応する画面を表示します。
    document.addEventListener('DOMContentLoaded', function() {
        showPage(window.location.pathname);
    });

    //【作業手順➁】ページ移動が発生した時に、Navigation APIで処理します。
    navigation.addEventListener('navigate', function(event) {
        let url = new URL(event.destination.url);

        // このWebサイト内の、処理を置き換えられるページ移動だけを対象にします。
        if (!event.canIntercept || url.origin !== window.location.origin) {
            return;
        }

        // メニューが開いている場合は、画面を切り替える前に閉じます。
        let menu = bootstrap.Offcanvas.getInstance(document.getElementById('mobileMenu'));
        if (menu) {
            menu.hide();
        }

        // 通常のページ移動を止め、URLに対応する画面だけを表示します。
        event.intercept({
            handler: function() {
                showPage(url.pathname);
            }
        });
    });

    //【作業手順③】URLを確認し、表示する画面を決めます。
    function showPage(path) {

        // 「/」または「/index.html」で開いた場合は、ホーム画面を表示します。
        if (path === '/' || path === '/index.html') {
            showHome();
            return;
        }

        // URLの最後に「/」が付いている場合も、商品一覧として扱います。
        if (path === '/products' || path === '/products/') {
            showProductList();
            return;
        }

        if (path === '/register' || path === '/register/') {
            showRegister();
            return;
        }

        // /products/3 の「3」に当たる商品番号を取り出します。
        let result = path.match(/^\/products\/(\d+)$/);

        if (result) {
            showProductDetail(result[1]);
            return;
        }

        document.getElementById('app').innerHTML = `
            <h2>ページが見つかりません</h2>
            <a href="/" class="btn btn-primary">
                商品一覧へ戻る
            </a>`;
    }

    // ホーム画面を表示します。
    function showHome() {
        document.getElementById('app').innerHTML = `
            <h1 class="page-title">ホーム</h1>
            <div class="welcome-box">
                <h2>商品管理システムへようこそ</h2>
                <p>メニューから商品一覧を表示し、商品の詳細を確認できます。</p>
                <a href="/products" class="btn btn-primary">商品一覧を見る</a>
            </div>`;
    }

    // 商品登録画面を表示します。
    function showRegister() {
        document.getElementById('app').innerHTML = `
            <h1 class="page-title">商品登録</h1>
            <div class="welcome-box">
                <p>ここは商品登録ページです。</p>
                <p>この章では画面遷移を中心に学習するため、登録機能の実装は割愛します。</p>
            </div>`;
    }

    // 商品一覧APIを呼び出し、一覧画面を表示します。
    function showProductList() {
        axios.get('http://localhost:3005/api/v43/products')
        .then(response => {
            let rows = '';

            response.data.forEach(product => {
                rows += `
                    <tr>
                        <td>${product.id}</td>
                        <td>
                            <a href="/products/${product.id}" class="product-detail-link">
                                ${product.name}
                            </a>
                        </td>
                        <td>${product.price}</td>
                        <td>${product.category}</td>
                    </tr>`;
            });

            document.getElementById('app').innerHTML = `
                <h2 class="page-title">商品一覧</h2>
                <p>商品名をクリックすると、再読み込みせずに詳細画面へ移動します。</p>
                <table class="product-table">
                    <thead>
                        <tr>
                            <th>商品番号</th>
                            <th>商品名</th>
                            <th>価格</th>
                            <th>カテゴリ</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>`;

            // 商品名がクリックされた時に、商品詳細のURLへ移動します。
            let detailLinks = document.querySelectorAll('.product-detail-link');

            detailLinks.forEach(detailLink => {
                detailLink.addEventListener('click', function(event) {
                    // 通常のリンクによるページ移動を止めます。
                    event.preventDefault();

                    // Navigation APIを使って、リンク先のURLへ移動します。
                    navigation.navigate(detailLink.getAttribute('href'));
                });
            });
        })
        .catch(error => console.error('商品一覧の取得に失敗しました:', error));
    }

    // 商品詳細APIを呼び出し、詳細画面を表示します。
    function showProductDetail(id) {
        axios.get(`http://localhost:3005/api/v43/products/${id}`)
        .then(response => {
            let product = response.data;

            document.getElementById('app').innerHTML = `
                <h2 class="page-title">商品詳細</h2>
                <table class="product-table">
                    <tr><th>商品番号</th><td>${product.id}</td></tr>
                    <tr><th>商品名</th><td>${product.name}</td></tr>
                    <tr><th>価格</th><td>${product.price}</td></tr>
                    <tr><th>カテゴリ</th><td>${product.category}</td></tr>
                </table>
                <a href="/products" class="btn btn-secondary">
                    商品一覧へ戻る
                </a>`;
        })
        .catch(error => {
            document.getElementById('app').innerHTML = `
                <p>商品情報を取得できませんでした。</p>
                <a href="/products" class="btn btn-primary">
                    商品一覧へ戻る
                </a>`;
            console.error('商品詳細の取得に失敗しました:', error);
        });
    }

    </script>
</body>
</html>
