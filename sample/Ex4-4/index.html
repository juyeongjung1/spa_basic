<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>コンポーネント化した商品管理SPA</title>

    <!-- API通信に使用するAxiosを読み込みます。 -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <!-- ボタンとModalにBootstrapを使用します。 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* ページ全体の外側の余白をなくし、薄い灰色の背景にします。 */
        body {
            margin: 0;
            background-color: #f5f5f5;
        }

        /* ヘッダー内のシステム名と三本線ボタンを横並びにします。 */
        .site-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            color: white;
            background-color: #0d6efd;
        }

        .site-title {
            color: white;
            font-size: 24px;
            text-decoration: none;
        }

        /* サイドバーとメイン画面を横並びにします。 */
        .layout {
            display: flex;
            min-height: 75vh;
        }

        /* PC画面の左側に表示する共通サイドバーです。 */
        .sidebar {
            width: 220px;
            padding: 24px;
            background-color: white;
            border-right: 1px solid #cccccc;
        }

        /* サイドバーのリンクを縦に並べます。 */
        .sidebar a {
            display: block;
            padding: 10px;
            color: #333333;
            text-decoration: none;
        }

        .sidebar a:hover {
            background-color: #eeeeee;
        }

        /* URLに対応したコンポーネントを表示する場所です。 */
        .main-content {
            flex: 1;
            min-width: 0;
            padding: 24px;
        }

        .page-title {
            margin-top: 0;
            margin-bottom: 16px;
        }

        .content-box {
            padding: 24px;
            background-color: white;
            border: 1px solid #cccccc;
        }

        .content-box h2 {
            margin-top: 0;
        }

        /* 商品一覧と商品詳細で使用するテーブルです。 */
        .product-table {
            width: 100%;
            margin-top: 16px;
            margin-bottom: 16px;
            background-color: white;
            border-collapse: collapse;
        }

        .product-table th,
        .product-table td {
            padding: 10px;
            border: 1px solid #999999;
        }

        .product-table th {
            color: white;
            background-color: #333333;
        }

        /* 登録フォームの入力欄を縦に並べます。 */
        .form-item {
            margin-bottom: 16px;
        }

        .form-item label {
            display: block;
            margin-bottom: 4px;
        }

        .form-item input,
        .form-item select {
            width: 100%;
            max-width: 400px;
            padding: 8px;
        }

        .error-message {
            color: red;
        }

        .button-area {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .mobile-menu-links a {
            display: block;
            padding: 10px;
            text-decoration: none;
        }

        .site-footer {
            padding: 16px;
            color: white;
            text-align: center;
            background-color: #212529;
        }

        /* PCでは三本線ボタンを表示しません。 */
        .mobile-menu-button {
            display: none;
        }

        /* 【参考】画面幅が768px以下の場合だけ適用します。 */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }

            .mobile-menu-button {
                display: block;
            }

            .main-content {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- ヘッダー、サイドバー、フッターは全画面で共通です。 -->
    <header class="site-header">
        <a href="/" class="site-title">商品管理システム</a>
        <button class="btn btn-outline-light mobile-menu-button" type="button"
                data-bs-toggle="offcanvas" data-bs-target="#mobileMenu">
            ☰
        </button>
    </header>

    <div class="layout">
        <aside class="sidebar">
            <h2>メニュー</h2>
            <nav>
                <a href="/">ホーム</a>
                <a href="/products">商品一覧</a>
                <a href="/register">商品登録</a>
            </nav>
        </aside>

        <!-- 各コンポーネントが、このapp要素へ画面を表示します。 -->
        <main id="app" class="main-content"></main>
    </div>

    <!-- 更新・削除のModalコンポーネントを挿入する場所です。 -->
    <div id="modal-area"></div>

    <!-- 【参考】タブレット端末以下で使用するメニューです。 -->
    <div class="offcanvas offcanvas-start" tabindex="-1" id="mobileMenu">
        <div class="offcanvas-header">
            <h2 class="offcanvas-title">メニュー</h2>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <nav class="mobile-menu-links">
                <a href="/">ホーム</a>
                <a href="/products">商品一覧</a>
                <a href="/register">商品登録</a>
            </nav>
        </div>
    </div>

    <footer class="site-footer">
        商品管理システム
    </footer>

    <!-- BootstrapのModalとOffcanvasを動かすJavaScriptです。 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!--
        type="module"を指定すると、app.jsでimportとexportを使用できます。
        画面ごとの処理は、app.jsから各コンポーネントへ分けています。
    -->
    <script type="module" src="/js/app.js"></script>
</body>
</html>
