<!DOCTYPE html>
<html>
<head>
    <title>.style_property</title>
</head>
<body>
<table id="myTable" border="1">
    <tr>
        <th>No</th>
        <th>名前</th>
        <th>年齢</th>
    </tr>
</table>
<button id="addRow">行を追加</button>
<button id="changeColor">色を反転</button>

<script>
document.getElementById('changeColor').addEventListener('click', function() {
    let table = document.getElementById('myTable');
    
    // テーブルの現在の背景色を取得後、チェックする
    if (table.style.backgroundColor === 'black') {
        // ダークモードからライトモードへ切り替え
        table.style.backgroundColor = 'white';
        table.style.color = 'black';
    } else {
        // ライトモードからダークモードへ切り替え
        table.style.backgroundColor = 'black';
        table.style.color = 'white';
    }
});


// 行番号をカウントする変数を定義
let rowCount = 1;

document.getElementById('addRow').addEventListener('click', function() {
    let table = document.getElementById('myTable');
    // テンプレートリテラルを使用して、行番号、名前、年齢を含む新しい行を挿入
    table.insertAdjacentHTML('beforeend', 
        `<tr>
            <td>${rowCount}</td>
            <td>新しい名前</td>
            <td>新しい年齢</td>
        </tr>`);
    // 行を追加するたびに行番号をインクリメント
    rowCount++;
});

</body>
</html>
