<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>classListで見た目を切り替える</title>
    <style>
        /* 普段のスタイル（ライトモード） */
        .box {
            padding: 20px;
            background-color: white;
            color: black;
            border: 1px solid #ccc;
            transition: all 0.3s ease;
        }

        /* 追加されるスタイル（ダークモード用） */
        .dark-mode {
            background-color: #333;
            color: white;
        }
    </style>
</head>
<body>
    <div id="targetArea" class="box">
        <p>ここの見た目が切り替わります。</p>
    </div>
    <button id="toggleBtn">モード切替</button>

    <script>
        // ボタンがクリックされたときの処理
        document.getElementById('toggleBtn').addEventListener('click', function() {
            // 1. 対象となる要素を取得
            let target = document.getElementById('targetArea');

            // 2. toggleメソッドで 'dark-mode' クラスを付け外しする
            target.classList.toggle('dark-mode');
        });
    </script>
</body>
</html>
