<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>classListで見た目を切り替える</title>
    <style>
        /* 普段のスタイル（ライトモード） */
        .box {
            padding: 20px;
            background-color: white;
            color: black;
            border: 1px solid #ccc;
        }

        /* 追加されるスタイル（ダークモード用） */
        .dark-mode {
            background-color: #333;
            color: white;
        }
    </style>
</head>
<body>
    <div id="targetArea" class="box">
        <p>ここの見た目が切り替わります。</p>
    </div>

    <button id="addBtn">ダークモードにする</button>
    <button id="removeBtn">ライトモードに戻す</button>
    <button id="toggleBtn">モード切替</button>

    <script>
        // 対象となる要素を取得
        let target = document.getElementById('targetArea');

        // addメソッドで 'dark-mode' クラスを追加する
        document.getElementById('addBtn').addEventListener('click', function() {
            target.classList.add('dark-mode');
        });

        // removeメソッドで 'dark-mode' クラスを削除する
        document.getElementById('removeBtn').addEventListener('click', function() {
            target.classList.remove('dark-mode');
        });

        // toggleメソッドで 'dark-mode' クラスを付け外しする
        document.getElementById('toggleBtn').addEventListener('click', function() {
            target.classList.toggle('dark-mode');
        });
    </script>
</body>
</html>
