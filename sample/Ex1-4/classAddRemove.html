<!DOCTYPE html>
<html>
<head>
    <title>.style_property</title>
     <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<table id="myTable" class = "table" border="1">
    <tr>
        <th>No</th>
        <th>名前</th>
        <th>年齢</th>
    </tr>
</table>
<button id="addRow">行を追加</button>
<button id="changeColor">色を反転</button>

<script>
document.getElementById('changeColor').addEventListener('click', function() {
  const table = document.getElementById('myTable');

//BootStrapのクラスを使用して、ダークモードとライトモードを切り替える方法
  if (table.classList.contains('table-dark')) {
    // ダーク→ライト
    table.classList.remove('table-dark', 'text-white');
    table.classList.add('table-light', 'text-dark');
  } else {
    // ライト→ダーク
    table.classList.remove('table-light', 'text-dark');
    table.classList.add('table-dark', 'text-white');
  }
});



// 行番号をカウントする変数を定義
let rowCount = 1;

document.getElementById('addRow').addEventListener('click', function() {
    let table = document.getElementById('myTable');
    // テンプレートリテラルを使用して、行番号、名前、年齢を含む新しい行を挿入
    table.insertAdjacentHTML('beforeend', 
        `<tr>
            <td>${rowCount}</td>
            <td>新しい名前</td>
            <td>新しい年齢</td>
        </tr>`);
    // 行を追加するたびに行番号をインクリメント
    rowCount++;
});
