<!DOCTYPE html>
<html lang="jp">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Bootstrap Inline and Vertical Form Example</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet">
    </head>
    <body class="bg-light p-4">
        <div class="container"> <!-- START container -->

            <div class="row"> <!-- START row1 -->
                <div class="col-md-3"> <!-- START sidebar -->
                    <div class="fs-5 fw-bold mb-3">名前検索</div>
                   
                    <form class="row">
                        <div class="col-8">
                            <input type="text" class="form-control"
                                placeholder="名前">
                        </div>
                        <div class="col-4">
                            <button type="submit"
                                class="btn btn-primary">検索</button>
                        </div>
                    </form>

                </div> <!-- END sidebar -->
            </div> <!-- END row1 -->
        </div> <!-- END container -->

        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
