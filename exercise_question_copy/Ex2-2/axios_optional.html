<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>Axios - BMI計算</title>
        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    </head>

    <body>
        <h1>BMI計算</h1>
        <input type="number" id="height" value="170" />
        <input type="number" id="weight" value="60.8" />
        <button id="calculateBtn">計算する</button>
        <div id="result"></div>
        <script>
            document.getElementById("calculateBtn").addEventListener("click", function () {
                // 【手順1】heightとweightの入力欄から値を取得してください。
                let height = document.getElementById('height').value;
                let weight = document.getElementById('weight').value;
                // 【手順2】AxiosのPOSTメソッドを使用し、http://localhost:3003/bmi へリクエストを送信してください。
                // 【手順3】POSTで送信するリクエストパラメータとして、heightとweightをオブジェクトにまとめてください。
                axios
                    .post('http://localhost:3003/bmi', {
                        height: height,
                        weight: weight
                    })
                    .then((response) => {
                        // 【手順4】response.dataをConsoleへ出力してください。
                        console.log(response.data);
                        // 【手順5】Consoleでレスポンスのプロパティ名がbmiとcategoryであることを確認してください。
                        // 【手順6】bmiとcategoryを使って、BMIと判定を画面へ表示してください。
                        document.getElementById("result").innerHTML = `BMI：${response.data.bmi}<br>${response.data.category}です`;
                    })
                    // 【手順7】失敗時にcatchが実行されることを確認してください。
                    .catch((error) => console.error("BMI計算に失敗しました:", error));
            });
        </script>
    </body>
</html>
