<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>addEventListener</title>
    </head>

    <body>
        <!-- 【手順1】ボタンにid「workEndBtn」を指定してください。 -->
        <button id="workEndBtn">退勤する</button>
        <script>
            // 【手順2】workEndBtnを選択し、変数btnへ代入してください。
            let btn = document.getElementById('workEndBtn');
            // 【手順3】btnへclickイベントを登録してください。
            btn.addEventListener('click', function(){
                alert('退勤を受け付けました');
            })
            // 【手順4】イベント発生時に「退勤を受け付けました」とalert表示してください。
            _____;
        </script>
    </body>
</html>
