<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>HTML属性のイベント</title>
    </head>

    <body>
        <!-- 【手順1】クリック時にshowWorkStartMessage()を呼び出すonclick属性を追加してください。 -->
        <button onclick="showWorkStartMessage()">出勤する</button>
        <script>
            // 【手順2】「出勤を受け付けました」とalert表示してください。
            function showWorkStartMessage() {
                alert('「出勤を受け付けました」');
            }
        </script>
    </body>
</html>
