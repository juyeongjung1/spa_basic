<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>関数の定義と呼び出し</title>
    </head>

    <body>
        <script>
            // 【手順1】showSystemName関数を「関数宣言」で定義してください。
            function showSystemName(){
                document.write('人事管理システム<br>');
            }

            showSystemName();
            // 【手順2】関数内でdocument.writeを使い、「人事管理システム」と改行を表示してください。
            // 【手順3】showSystemName関数を呼び出してください。
            // 【手順4】showOperationGuide関数を「関数式」で定義してください。
            let showOperationGuide = function(){
                document.write('社員メニューを選択してください')
            }
            showOperationGuide();
            // 【手順5】関数内で「社員メニューを選択してください」と表示してください。
            // 【手順6】showOperationGuide関数を呼び出してください。
        </script>
    </body>
</html>
