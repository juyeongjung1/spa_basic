<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>社員登録</title>
        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    </head>

    <body>
        <h1>新規社員登録</h1>
        <p id="errorMessage" style="color: red"></p>
        <label>
            パスワード
            <input type="password" id="password" />
        </label>
        <br />
        <label>
            氏名
            <input type="text" id="name" />
        </label>
        <br />
        <label>
            給与
            <input type="number" id="salary" />
        </label>
        <br />
        <label>
            勤務地
            <input type="text" id="locationName" />
        </label>
        <br />
        <label>
            画像パス
            <input type="text" id="imagePath" />
            <span>※ 例: ../images/1001.png</span>
        </label>
        <br />
        <button id="registerBtn">登録</button>
        <table border="1">
            <thead>
                <tr>
                    <th>顔写真</th>
                    <th>社員番号</th>
                    <th>氏名</th>
                    <th>給与</th>
                    <th>勤務地</th>
                </tr>
            </thead>
            <tbody id="employeeList"></tbody>
        </table>
        <script>
            document.addEventListener("DOMContentLoaded", function () {
                // 3-3で作成した関数を使い、初期表示時にも社員一覧を表示します。
                axios
                    .get('http://localhost:3005/api/employees')
                    .then((response) => showEmployeeList(response.data))
                    .catch((error) => console.error("社員一覧の取得に失敗しました:", error));
            });

            document.getElementById("registerBtn").addEventListener("click", function () {
                // 【手順1】HTMLのフォームのidを確認し、5つの入力値を取得してください。
                let password = document.getElementById("password").value;
                let name = document.getElementById("name").value;
                let salary = document.getElementById("salary").value;
                let locationName = document.getElementById("locationName").value;
                let imagePath = document.getElementById("imagePath").value;
                
                let errorMessage = document.getElementById("errorMessage");
                errorMessage.innerHTML = "";
                // 【手順2】password、name、salaryが未入力ならエラーを表示してreturnしてください。
                if (!password || !name || !salary){
                    errorMessage.innerHTML = 'データを入力してください。';
                    return;
                }
                // 【手順3】POST http://localhost:3005/api/employees へ5項目を送信してください。
                axios.post('http://localhost:3005/api/employees', {
                    password: password,
                    name: name,
                    salary: salary,
                    location_name: locationName,
                    image_path: imagePath
                })
                    .then((response) => {
                        // 【手順4】登録後の社員一覧を表示してください。
                        showEmployeeList(response.data);
                    })
                    .catch((error) => {
                        errorMessage.innerHTML = "社員登録に失敗しました。";
                        console.error(error);
                    });
            });
            // 一覧描画は学習済みのため完成済みです。
            function showEmployeeList(employees) {
                let list = document.getElementById("employeeList");
                list.innerHTML = "";
                employees.forEach((e) =>
                    list.insertAdjacentHTML(
                        "beforeend",
                        `<tr><td>${e.image_path ? "<img src=\"" + e.image_path + "\" alt=\"" + e.name + "の顔写真\" width=\"48\" height=\"48\" style=\"object-fit: cover\" />" : ""}</td><td>${e.id}</td><td>${e.name}</td><td>${e.salary}</td><td>${e.location_name}</td></tr>`,
                    ),
                );
            }
        </script>
    </body>
</html>
