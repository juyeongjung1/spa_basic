<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>人事管理SPA</title>
        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
        <style>
            body {
                margin: 0;
                font-family: sans-serif;
            }

            header,
            footer {
                background: #0f766e;
                color: white;
                padding: 16px;
            }

            nav a {
                color: white;
                margin-right: 16px;
                text-decoration: none;
                font-weight: bold;
            }

            nav a:hover {
                color: #ccfbf1;
                text-decoration: underline;
            }

            footer {
                background: #1f2937;
            }

            main {
                padding: 24px;
            }

            table {
                border-collapse: collapse;
            }

            th,
            td {
                border: 1px solid #aaa;
                padding: 8px;
            }
        </style>
    </head>

    <body>
        <header>
            <h1>人事管理システム</h1>
            <nav>
                <a href="/">ホーム</a>
                <a href="/employees">社員一覧</a>
                <a href="/employees/new">新規社員登録</a>
                <a href="/about">このシステムについて</a>
            </nav>
        </header>
        <main id="app"></main>
        <footer>人事管理システム</footer>
        <script>
            document.addEventListener("DOMContentLoaded", function () {
                showPage(window.location.pathname);
            });

            navigation.addEventListener("navigate", function (event) {
                let url = new URL(event.destination.url);

                const canIntercept = url.origin === location.origin;
                if (!canIntercept) {
                    return;
                }

                event.intercept({
                    handler() {
                        showPage(url.pathname);
                    },
                });
            });

            // showPageは、現在のURLのパスを見て、どの画面表示関数を呼び出すかを決める関数です。
            // たとえば「/employees」なら社員一覧、「/employees/new」なら新規登録画面を表示します。
            // URLと関数の対応をここに集めることで、リンクをクリックした時も、URLを直接入力した時も同じ処理で画面を切り替えられます。
            function showPage(path) {
                if (path === "/" || path === "/index.html") {
                    showHome();
                    return;
                }
                if (path === "/employees" || path === "/employees/") {
                    showEmployeeList();
                    return;
                }
                if (path === "/employees/new" || path === "/employees/new/") {
                    showEmployeeRegister();
                    return;
                }
                if (path === "/about" || path === "/about/") {
                    showAbout();
                    return;
                }

                // /employees/1001 のようなURLでは、正規表現で社員番号部分を取り出します。
                let result = path.match(/^\/employees\/(\d+)$/);
                if (result) {
                    showEmployeeDetail(result[1]);
                    return;
                }

                showHome();
            }

            function showHome() {
                document.getElementById("app").innerHTML = `
                    <h2>ホーム</h2>
                    <p>社員管理SPAです。上のナビゲーションから画面を切り替えてください。</p>
                `;
            }

            function showEmployeeList() {
                axios.get("http://localhost:3005/api/employees").then((response) => {
                    document.getElementById("app").innerHTML = `
                    <h2>社員一覧</h2>
                    <table>
                        <thead>
                            <tr>
                                <th>顔写真</th>
                                <th>社員番号</th>
                                <th>氏名</th>
                                <th>給与</th>
                                <th>勤務地</th>
                            </tr>
                        </thead>
                        <tbody id="employeeList"></tbody>
                    </table>
                    `;

                    let list = document.getElementById("employeeList");
                    list.innerHTML = "";

                    response.data.forEach((e) => {
                        list.insertAdjacentHTML(
                            "beforeend",
                            `
                            <tr>
                                <td><img class="employee-photo" src="${e.image_path}" alt="${e.name}の顔写真"></td>
                                <td>${e.id}</td>
                                <td><a href="/employees/${e.id}">${e.name}</a></td>
                                <td>${e.salary}</td>
                                <td>${e.location_name || ""}</td>
                            </tr>
                            `
                        );
                    });
                });
            }

            function showEmployeeRegister() {
                document.getElementById("app").innerHTML = `
                    <h2>新規社員登録</h2>
                    <p>この演習では画面遷移を確認します。</p>
                `;
            }

            function showEmployeeDetail(id) {
                axios.get(`http://localhost:3005/api/employees/${id}`).then((response) => {
                    const e = response.data;
                    document.getElementById("app").innerHTML = `
                    <h2>社員詳細</h2>
                    <img class="detail-photo" src="${e.image_path}" alt="${e.name}の顔写真">
                    <p>社員番号: ${e.id}</p>
                    <p>氏名: ${e.name}</p>
                    <p>給与: ${e.salary}</p>
                    <p>勤務地: ${e.location_name || ""}</p>
                    <a href="/employees">一覧へ戻る</a>
                    `;
                });
            }

            function showAbout() {
                document.getElementById("app").innerHTML = `
                    <h2>このアプリについて</h2>
                    <p>Navigation APIを使って画面を切り替えるSPAです。</p>
                `;
            }
        </script>
    </body>
</html>
