<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>社員一覧</title>
        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    </head>

    <body>
        <h1>社員一覧</h1>
        <table border="1">
            <thead>
                <tr>
                    <th>顔写真</th>
                    <th>社員番号</th>
                    <th>氏名</th>
                    <th>給与</th>
                    <th>勤務地</th>
                </tr>
            </thead>
            <tbody id="employeeList"></tbody>
        </table>
        <script>
            // 【手順1】HTMLの読み込み完了時に処理するイベント名を指定してください。
            document.addEventListener('DOMContentLoaded', function () {
                // 【手順2】GET方式で社員一覧API（http://localhost:3005/api/employees）を呼び出してください。
                axios.get('http://localhost:3005/api/employees')
                    .then((response) => {
                        // 【手順3】response.dataをshowEmployeeListへ渡してください。
                        showEmployeeList(response.data)
                    })
                    .catch((error) => console.error("社員一覧の取得に失敗しました:", error));
            });

            function showEmployeeList(employees) {
                let employeeList = document.getElementById("employeeList");
                employeeList.innerHTML = "";
                // 【手順4】forEachで社員を1名ずつ処理してください。
                employees.forEach((employee) => {
                    // 【手順5】顔写真、id、name、salary、location_nameを持つ行を作成してください。
                    let employeeHtml = `<tr>
                        <td>${employee.image_path ? "<img src=\"" + employee.image_path + "\" alt=\"" + employee.name + "の顔写真\" width=\"48\" height=\"48\" style=\"object-fit: cover\" />" : ""}</td>
                        <td>${employee.id}</td><td>${employee.name}</td><td>${employee.salary}</td><td>${employee.location_name}</td>
                        </tr>`;
                    // 【手順6】tbodyの末尾へ行を追加してください。
                    employeeList.insertAdjacentHTML('beforeend', employeeHtml);
                });
            }
        </script>
    </body>
</html>
