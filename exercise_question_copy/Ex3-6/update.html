<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>社員更新</title>
        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    </head>

    <body>
        <h1>社員更新</h1>
        <table border="1">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>氏名</th>
                    <th>給与</th>
                    <th>勤務地</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="employeeList"></tbody>
        </table>
        <h2>更新フォーム</h2>
        <input type="hidden" id="updateId" />
        <label>
            パスワード
            <input type="password" id="updatePassword" />
        </label>
        <br />
        <label>
            氏名
            <input id="updateName" />
        </label>
        <br />
        <label>
            給与
            <input type="number" id="updateSalary" />
        </label>
        <br />
        <label>
            勤務地
            <input id="updateLocationName" />
        </label>
        <br />
        <label>
            画像パス
            <input id="updateImagePath" />
        </label>
        <br />
        <img id="updateImage" alt="社員画像" width="120" style="display: none" />
        <br />
        <button id="updateBtn">更新</button>
        <p id="message"></p>
        <script>
            function showEmployeeList(employees) {
                let list = document.getElementById("employeeList");
                list.innerHTML = "";
                employees.forEach((e) =>
                    list.insertAdjacentHTML(
                        "beforeend",
                        `
                <tr>
                    <td>${e.id}</td>
                    <td>${e.name}</td>
                    <td>${e.salary}</td>
                    <td>${e.location_name}</td>
                    <td>
                        <!-- 【手順1】更新ボタンから、対象社員の社員番号をsetUpdateFormへ渡してください。 -->
                        <button onclick="setUpdateForm(${e.id})">更新</button>
                    </td>
                </tr>
            `,
                    ),
                );
            }

            function setUpdateForm(id) {
                // 【手順2】主キー検索APIで、対象社員の詳細情報を取得してください。
                axios.get(`http://localhost:3005/api/employees/${id}`)
                    .then((response) => {
                        let employee = response.data;
                        // 【手順3】取得した社員情報を各入力欄へ設定してください。パスワードは空欄にします。
                        document.getElementById("updateId").value = employee.id;
                        document.getElementById("updatePassword").value = "";
                        document.getElementById("updateName").value = employee.name;
                        document.getElementById("updateSalary").value = employee.salary;
                        document.getElementById("updateLocationName").value =
                            employee.location_name;
                        document.getElementById("updateImagePath").value = employee.image_path;
                        // 【手順4】image_pathがある場合だけ社員画像を表示してください。
                        let image = document.getElementById("updateImage");
                        image.style.display = employee.image_path ? "block" : "none";
                        image.src = employee.image_path || "";
                    })
                    .catch((error) => console.error("社員詳細の取得に失敗しました:", error));
            }
            document.getElementById("updateBtn").addEventListener("click", function () {
                // 【手順5】更新フォームの社員番号と5項目を取得してください。
                let id = document.getElementById("updateId").value;
                let password = document.getElementById("updatePassword").value;
                let name = document.getElementById("updateName").value;
                let salary = document.getElementById("updateSalary").value;
                let locationName = document.getElementById("updateLocationName").value;
                let imagePath = document.getElementById("updateImagePath").value;
                // 【手順6】PUT http://localhost:3005/api/employees/${id} へ5項目を送信してください。
                axios.put(`http://localhost:3005/api/employees/${id}`, {
                        password: password,
                        name: name,
                        salary: salary,
                        location_name: locationName,
                        image_path: imagePath,
                    })
                    .then((response) => {
                        // 【手順7】最新一覧を再描画してください。
                        showEmployeeList(response.data);
                        document.getElementById("message").innerHTML = "更新しました。";
                    })
                    .catch((error) => console.error("社員更新に失敗しました:", error));
            });
            document.addEventListener("DOMContentLoaded", () =>
                axios.get("http://localhost:3005/api/employees").then((r) => showEmployeeList(r.data)),
            );
        </script>
    </body>
</html>
