<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><title>社員登録Modal</title><script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="container py-4"><h1>社員一覧</h1><button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#registerModal">新規社員登録</button><table class="table"><thead><tr><th>ID</th><th>氏名</th><th>給与</th><th>勤務地</th></tr></thead><tbody id="employeeList"></tbody></table>
<div class="modal fade" id="registerModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h2 class="modal-title fs-5">新規社員登録</h2><button class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><p id="errorMessage" class="text-danger"></p><input class="form-control" type="password" id="password" placeholder="パスワード"><input class="form-control" id="name" placeholder="氏名"><input class="form-control" type="number" id="salary" placeholder="給与"><input class="form-control" id="locationName" placeholder="勤務地"><input class="form-control" id="imagePath" placeholder="画像パス"></div><div class="modal-footer"><button id="registerBtn" class="btn btn-primary">登録</button></div></div></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script>
function showEmployeeList(employees){let list=document.getElementById('employeeList');list.innerHTML='';employees.forEach(e=>list.insertAdjacentHTML('beforeend',`<tr><td>${e.id}</td><td>${e.name}</td><td>${e.salary}</td><td>${e.location_name}</td></tr>`));}
document.getElementById('registerBtn').addEventListener('click',function(){
    let password=document.getElementById('password').value,name=document.getElementById('name').value,salary=document.getElementById('salary').value,locationName=document.getElementById('locationName').value,imagePath=document.getElementById('imagePath').value;
    // Modal内の入力値も通常のフォームと同じくvalueで取得してPOSTします。
    axios.post('http://localhost:3005/api/employees',{password:password,name:name,salary:salary,location_name:locationName,image_path:imagePath})
    .then(response=>{
        showEmployeeList(response.data);
        // getInstanceで現在表示中のModalを取得し、hideで閉じます。
        bootstrap.Modal.getInstance(document.getElementById('registerModal')).hide();
        // 次回登録時のため入力欄を初期化します。
        ['password','name','salary','locationName','imagePath'].forEach(id=>document.getElementById(id).value='');
        document.getElementById('errorMessage').innerHTML='';
    }).catch(error=>document.getElementById('errorMessage').innerHTML='登録に失敗しました。');
});
document.addEventListener('DOMContentLoaded',()=>axios.get('http://localhost:3005/api/employees').then(r=>showEmployeeList(r.data)));
</script></body></html>
