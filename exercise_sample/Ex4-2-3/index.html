<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>社員更新・削除Modal</title>
        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
    </head>

    <body class="container py-4">
        <h1>社員一覧</h1>
        <table class="table">
            <thead>
                <tr>
                    <th>顔写真</th>
                    <th>ID</th>
                    <th>氏名</th>
                    <th>給与</th>
                    <th>勤務地</th>
                </tr>
            </thead>
            <tbody id="employeeList"></tbody>
        </table>
        <div class="modal fade" id="detailModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2 class="modal-title fs-5">社員詳細</h2>
                        <button class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <span id="detailId"></span>
                        <span id="detailName"></span>
                        <span id="detailSalary"></span>
                        <span id="detailLocation"></span>
                    </div>
                    <div class="modal-footer">
                        <button
                            class="btn btn-primary"
                            data-bs-toggle="modal"
                            data-bs-target="#updateModal"
                        >
                            編集
                        </button>
                        <button id="deleteBtn" class="btn btn-danger">削除</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal fade" id="updateModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2 class="modal-title fs-5">社員編集</h2>
                        <button class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="updateId" />
                        <label class="d-flex align-items-center gap-2 mb-2">
                            <span style="width: 90px">パスワード</span>
                            <input class="form-control" type="password" id="updatePassword" />
                        </label>
                        <label class="d-flex align-items-center gap-2 mb-2">
                            <span style="width: 90px">氏名</span>
                            <input class="form-control" id="updateName" />
                        </label>
                        <label class="d-flex align-items-center gap-2 mb-2">
                            <span style="width: 90px">給与</span>
                            <input class="form-control" type="number" id="updateSalary" />
                        </label>
                        <label class="d-flex align-items-center gap-2 mb-2">
                            <span style="width: 90px">勤務地</span>
                            <input class="form-control" id="updateLocation" />
                        </label>
                        <label class="d-flex align-items-center gap-2 mb-2">
                            <span style="width: 90px">画像パス</span>
                            <input class="form-control" id="updateImagePath" />
                        </label>
                    </div>
                    <div class="modal-footer">
                        <button id="updateBtn" class="btn btn-primary">更新</button>
                    </div>
                </div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script>
            function showEmployeeList(employees) {
                let list = document.getElementById("employeeList");
                list.innerHTML = "";
                employees.forEach((e) =>
                    list.insertAdjacentHTML(
                        "beforeend",
                        `
                <tr>
                    <td>
                        ${e.image_path ? '<img src="' + e.image_path + '" alt="' + e.name + 'の顔写真" width="48" height="48" style="object-fit: cover" />' : ""}
                    </td>
                    <td>${e.id}</td>
                    <td>
                        <a href="#" onclick="showEmployeeDetail(${e.id}); return false;">
                            ${e.name}
                        </a>
                    </td>
                    <td>${e.salary}</td>
                    <td>${e.location_name}</td>
                </tr>
            `,
                    ),
                );
            }

            function showEmployeeDetail(id) {
                axios.get(`http://localhost:3005/api/employees/${id}`).then((response) => {
                    let e = response.data;
                    document.getElementById("detailId").innerHTML = e.id;
                    document.getElementById("detailName").innerHTML = e.name;
                    document.getElementById("detailSalary").innerHTML = e.salary;
                    document.getElementById("detailLocation").innerHTML = e.location_name;
                    // 同じ詳細レスポンスを更新フォームの初期値にも利用します。
                    document.getElementById("updateId").value = e.id;
                    document.getElementById("updatePassword").value = "";
                    document.getElementById("updateName").value = e.name;
                    document.getElementById("updateSalary").value = e.salary;
                    document.getElementById("updateLocation").value = e.location_name;
                    document.getElementById("updateImagePath").value = e.image_path;
                    new bootstrap.Modal(document.getElementById("detailModal")).show();
                });
            }
            document.getElementById("updateBtn").addEventListener("click", function () {
                let id = document.getElementById("updateId").value;
                let body = {
                    password: document.getElementById("updatePassword").value,
                    name: document.getElementById("updateName").value,
                    salary: document.getElementById("updateSalary").value,
                    location_name: document.getElementById("updateLocation").value,
                    image_path: document.getElementById("updateImagePath").value,
                };
                axios.put(`http://localhost:3005/api/employees/${id}`, body).then((response) => {
                    showEmployeeList(response.data);
                    // 現在表示中の更新Modalを取得して閉じます。
                    bootstrap.Modal.getInstance(document.getElementById("updateModal")).hide();
                });
            });
            document.getElementById("deleteBtn").addEventListener("click", function () {
                let id = document.getElementById("detailId").innerHTML;
                axios.delete(`http://localhost:3005/api/employees/${id}`).then((response) => {
                    showEmployeeList(response.data);
                    bootstrap.Modal.getInstance(document.getElementById("detailModal")).hide();
                });
            });
            document.addEventListener("DOMContentLoaded", () =>
                axios
                    .get("http://localhost:3005/api/employees")
                    .then((r) => showEmployeeList(r.data)),
            );
        </script>
    </body>
</html>
