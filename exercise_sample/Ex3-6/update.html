<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>社員更新</title>
        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    </head>

    <body>
        <h1>社員更新</h1>
        <table border="1">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>氏名</th>
                    <th>給与</th>
                    <th>勤務地</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="employeeList"></tbody>
        </table>
        <h2>更新フォーム</h2>
        <input type="hidden" id="updateId" />
        <input type="password" id="updatePassword" placeholder="パスワード" />
        <input id="updateName" placeholder="氏名" />
        <input type="number" id="updateSalary" placeholder="給与" />
        <input id="updateLocationName" placeholder="勤務地" />
        <input id="updateImagePath" placeholder="画像パス" />
        <button id="updateBtn">更新</button>
        <p id="message"></p>
        <script>
            let employeeData = [];

            function showEmployeeList(employees) {
                employeeData = employees;
                let list = document.getElementById("employeeList");
                list.innerHTML = "";
                employees.forEach((e) =>
                    list.insertAdjacentHTML(
                        "beforeend",
                        `
                <tr>
                    <td>${e.id}</td>
                    <td>${e.name}</td>
                    <td>${e.salary}</td>
                    <td>${e.location_name}</td>
                    <td>
                        <button onclick="setUpdateForm(${e.id})">更新</button>
                    </td>
                </tr>
            `,
                    ),
                );
            }

            function setUpdateForm(id) {
                // findは条件に一致する最初の要素を返します。
                let employee = employeeData.find((employee) => employee.id === id);
                document.getElementById("updateId").value = employee.id;
                // 保存済みパスワードを画面へ表示しないため、再入力用に空欄とします。
                document.getElementById("updatePassword").value = "";
                document.getElementById("updateName").value = employee.name;
                document.getElementById("updateSalary").value = employee.salary;
                document.getElementById("updateLocationName").value = employee.location_name;
                document.getElementById("updateImagePath").value = employee.image_path;
            }
            document.getElementById("updateBtn").addEventListener("click", function () {
                let id = document.getElementById("updateId").value;
                let password = document.getElementById("updatePassword").value;
                let name = document.getElementById("updateName").value;
                let salary = document.getElementById("updateSalary").value;
                let locationName = document.getElementById("updateLocationName").value;
                let imagePath = document.getElementById("updateImagePath").value;
                // PUTは既存社員の更新に使い、対象idをURLへ含めます。
                axios
                    .put(`http://localhost:3005/api/employees/${id}`, {
                        password: password,
                        name: name,
                        salary: salary,
                        location_name: locationName,
                        image_path: imagePath,
                    })
                    .then((response) => {
                        showEmployeeList(response.data);
                        document.getElementById("message").innerHTML = "更新しました。";
                    })
                    .catch((error) => console.error("社員更新に失敗しました:", error));
            });
            document.addEventListener("DOMContentLoaded", () =>
                axios
                    .get("http://localhost:3005/api/employees")
                    .then((r) => showEmployeeList(r.data)),
            );
        </script>
    </body>
</html>
