<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>社員詳細Modal</title>
        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
    </head>

    <body class="container py-4">
        <h1>社員一覧</h1>
        <table class="table">
            <thead>
                <tr>
                    <th>顔写真</th>
                    <th>ID</th>
                    <th>氏名</th>
                    <th>給与</th>
                    <th>勤務地</th>
                </tr>
            </thead>
            <tbody id="employeeList"></tbody>
        </table>
        <div class="modal fade" id="detailModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2 class="modal-title fs-5">社員詳細</h2>
                        <button class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <p>
                            社員番号：
                            <span id="detailId"></span>
                        </p>
                        <p>
                            氏名：
                            <span id="detailName"></span>
                        </p>
                        <p>
                            給与：
                            <span id="detailSalary"></span>
                        </p>
                        <p>
                            勤務地：
                            <span id="detailLocation"></span>
                        </p>
                        <img id="detailImage" alt="社員画像" width="120" />
                    </div>
                </div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script>
            function showEmployeeList(employees) {
                let list = document.getElementById("employeeList");
                list.innerHTML = "";
                employees.forEach((e) =>
                    list.insertAdjacentHTML(
                        "beforeend",
                        `
                <tr>
                    <td>
                        ${e.image_path ? '<img src="' + e.image_path + '" alt="' + e.name + 'の顔写真" width="48" height="48" style="object-fit: cover" />' : ""}
                    </td>
                    <td>${e.id}</td>
                    <td>
                        <a href="#" onclick="showEmployeeDetail(${e.id}); return false;">
                            ${e.name}
                        </a>
                    </td>
                    <td>${e.salary}</td>
                    <td>${e.location_name}</td>
                </tr>
            `,
                    ),
                );
            }

            function showEmployeeDetail(id) {
                // 一覧でクリックした社員番号をURLへ含め、1名だけ取得します。
                axios
                    .get(`http://localhost:3005/api/employees/${id}`)
                    .then((response) => {
                        let employee = response.data;
                        // APIのプロパティと表示先を1対1で対応させます。passwordは表示しません。
                        document.getElementById("detailId").innerHTML = employee.id;
                        document.getElementById("detailName").innerHTML = employee.name;
                        document.getElementById("detailSalary").innerHTML = employee.salary;
                        document.getElementById("detailLocation").innerHTML =
                            employee.location_name;
                        let image = document.getElementById("detailImage");
                        image.style.display = employee.image_path ? "block" : "none";
                        image.src = employee.image_path || "";
                        // new bootstrap.Modalで対象要素をModalとして初期化し、show()で表示します。
                        let modal = new bootstrap.Modal(document.getElementById("detailModal"));
                        modal.show();
                    })
                    .catch((error) => console.error("社員詳細の取得に失敗しました:", error));
            }
            document.addEventListener("DOMContentLoaded", () =>
                axios
                    .get("http://localhost:3005/api/employees")
                    .then((r) => showEmployeeList(r.data)),
            );
        </script>
    </body>
</html>
