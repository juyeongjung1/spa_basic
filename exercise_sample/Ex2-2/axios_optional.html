<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>Axios - 積と和</title>
        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    </head>

    <body>
        <h1>積と和の計算</h1>
        <input type="number" id="number1" value="3" />
        <input type="number" id="number2" value="5" />
        <button id="calculateBtn">計算する</button>
        <div id="result"></div>
        <script>
            document.getElementById("calculateBtn").addEventListener("click", function () {
                // 入力欄の値は、選択した要素のvalueで取得できます。
                let number1 = document.getElementById("number1").value;
                let number2 = document.getElementById("number2").value;
                // 2つの数値をURLへ含めて計算APIを呼び出します。
                axios
                    .get(`http://localhost:3003/calculate/${number1}/${number2}`)
                    .then((response) => {
                        // response.dataの中にmultiplyとsumが入っていることを確認します。
                        console.log(response.data);
                        document.getElementById("result").innerHTML = `
            積: ${response.data.multiply}<br>
            和: ${response.data.sum}`;
                    })
                    .catch((error) => console.error("計算に失敗しました:", error));
            });
        </script>
    </body>
</html>
