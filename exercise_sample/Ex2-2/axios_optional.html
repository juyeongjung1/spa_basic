<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>Axios - BMI計算</title>
        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    </head>

    <body>
        <h1>BMI計算</h1>
        <input type="number" id="height" value="170" />
        <input type="number" id="weight" value="65" />
        <button id="calculateBtn">計算する</button>
        <div id="result"></div>
        <script>
            document.getElementById("calculateBtn").addEventListener("click", function () {
                // 入力欄の値は、選択した要素のvalueで取得できます。
                let height = document.getElementById("height").value;
                let weight = document.getElementById("weight").value;
                // 身長と体重をリクエストパラメータとしてPOSTで送信します。
                axios
                    .post("http://localhost:3003/bmi", {
                        height: height,
                        weight: weight,
                    })
                    .then((response) => {
                        // response.dataの中にbmiとcategoryが入っていることを確認します。
                        console.log(response.data);
                        document.getElementById("result").innerHTML = `
            BMI: ${response.data.bmi}<br>
            判定: ${response.data.category}`;
                    })
                    .catch((error) => console.error("BMI計算に失敗しました:", error));
            });
        </script>
    </body>
</html>
