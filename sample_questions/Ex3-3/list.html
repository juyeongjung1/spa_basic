<!DOCTYPE html>
<html>
<head>
    <title>初期画面</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <meta charset="UTF-8">
</head>

<body>
    <table>
<!--➀テーブルの表示が固定される<thead>と、動的に変わる<tbody>に分かれていることを確認してください-->
        <thead>
            <tr>
                <th>商品番号</th>
                <th>商品名</th>
                <th>価格</th>
            </tr>
        </thead>
<!-- ➁<tbody>のid属性の値を確認してください。-->
        <tbody id="product_list">
            <!--ここにデータが挿入されます-->
        </tbody>
    </table>
    
<script>
document.addEventListener('DOMContentLoaded', function() {
    //➂　呼び出すAPIのURLを確認してください。
    axios.get('http://localhost:8080/api/v331/productsQ')

    
//➃ rest_sample_3/controller/chap3_3_1/ProductController1Q@searchProductメソッドの問題を解いてから戻ってください。

.then(response => {
    //➅　showProductList関数にresponse.dataを引数に入れ実行してください。
    //(先に➄のshowProductList関数を確認してください。)
    
})
.catch(error => console.error('エラーが発生しました:', error));
});

//商品リストを表示する関数
//➄　showProductListのコードを確認してください。
function showProductList(products){
    let productList = document.getElementById('product_list');
    productList.innerHTML = ''; //既存のテーブルデータを初期化

    //リスト.forEach(変数 => {   })  は、Thymeleafのth:eachのようなものです。
    products.forEach(product => {
    //複数の行のデータを、1行ずつ<tr>を生成して挿入していきます。
        let productHtml = `
        <tr>
            <td>${product.id}<td>${product.name}</td><td>${product.price}</td>
        </tr>`;
        //<tbody>の要素の<tr>の後ろに挿入し続けてます
        productList.insertAdjacentHTML('beforeend', productHtml);
    });
}
//➆　このHTMLを実行して動作確認をしてください。
</script>
</body>
</html>
