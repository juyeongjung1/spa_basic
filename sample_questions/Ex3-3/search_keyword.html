<!DOCTYPE html>
<html>
<head>
    <title>初期画面</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <meta charset="UTF-8">
</head>

<body>
    <!-- 【作業手順①】HTML要素の準備 -->
    <!-- 検索フォーム、検索ボタン、一覧表示ボタンのid属性を確認してください。 -->
    <input type = "text" id = "searchName" placeholder="商品名">
    <button id = "searchBtn">検索</button>
    <button id = "listBtn">一覧表示</button>
    <table>
        <thead>
            <tr>
                <th>商品番号</th>
                <th>商品名</th>
                <th>価格</th>
                <th>カテゴリ</th>
            </tr>
        </thead>
        <tbody id="product_list">
            <!--ここにデータが挿入されます-->
        </tbody>
    </table>
    
<script>
// 【作業手順②】キーワードをAPI側へ送信しながら呼び出し
// ➀ 検索ボタンの正しいidを指定してください。
document.getElementById('xxxx').addEventListener('click', function() {
    // ➁ テキストフォームの入力値を取得し、変数nameへ代入してください。
    
    // ➂ クエリパラメータkeywordを使う正しいURLに修正してください。
    axios.get(`http://localhost:8080/api/v332/productsQ?keyword=${xxxxx}`
)

// 【作業手順④】api/server.jsの「3-3-2 商品一覧・キーワード検索API」の問題を解いてから戻ってください。

.then(response => {
    // 【作業手順⑤】APIから戻ったデータを画面に表示します。
    // ➅ response.dataをshowProductList関数に渡してください。
    xxxxx(response.data);
})
.catch(error => console.error('エラーが発生しました:', error));
});

// 【作業手順③】一覧表示をするボタンのJavaScript
// ➃ 検索後にもう一度一覧を表示するため、一覧表示ボタンの正しいidを指定してください。
document.getElementById('xxxx').addEventListener('click', function() {
    // ➄ 一覧取得APIの正しいURLに修正してください。
    //    キーワード検索と同じAPIですが、keywordパラメータは付けません。
    axios.get('http://localhost:8080/api/v332/productsQ')

.then(response => {
    // ➆ 一覧表示でも、APIから戻ったデータをshowProductList関数に渡してください。
    xxxxx(response.data);
})
.catch(error => console.error('エラーが発生しました:', error));
});

//========この下は、既存のコードです。＝＝＝＝＝＝＝＝＝＝＝＝
document.addEventListener('DOMContentLoaded', function() {
    axios.get('http://localhost:8080/api/v332/products')

.then(response => {
    showProductList(response.data);
})
.catch(error => console.error('エラーが発生しました:', error));
});

// 【作業手順⑤】APIからのデータを動的レンダリング
// 全件検索でもキーワード検索でも、APIから戻るリストデータをshowProductList関数に渡します。
//商品リストを表示する関数
function showProductList(products){
    let productList = document.getElementById('product_list');
    productList.innerHTML = ''; //既存のテーブルデータを初期化

    products.forEach(product => {
        let productHtml = `
        <tr>
            <td>${product.id}</td><td>${product.name}</td><td>${product.price}</td><td>${product.category}</td>
        </tr>`;
        productList.insertAdjacentHTML('beforeend', productHtml);
    });
}
</script>
</body>
</html>
