<!DOCTYPE html>
<html>
<head>
    <title>イベントリスナーを定義する</title>
</head>
<body>

<form>
  <!--➀下の要素内に、onClick属性を付与し、showMessage()関数を割り当ててください。-->      
  <input type = "button" value = "クリック"       >
</form>

<script>

  //イベントの処理を担当するための関数
  function showMessage() {
      alert('ボタンがクリックされました！');
  }
  
</script>

</body>
</html>
