<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品一覧とModal</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <!-- Modalを使うためにBootstrapを読み込みます。 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <h1>商品管理システム</h1>

    <input type="text" id="searchName" placeholder="商品名">
    <button id="searchBtn">検索</button>
    <button id="listBtn">一覧表示</button>

    <table border="1">
        <thead>
            <tr>
                <th>商品番号</th>
                <th>商品名</th>
                <th>価格</th>
                <th>カテゴリ</th>
            </tr>
        </thead>
        <tbody id="product_list">
            <!-- ここに商品データが挿入されます。 -->
        </tbody>
    </table>

    <!-- 実装は作業手順➀から➄まで、番号順に進めてください。 -->
    <!-- 作業手順③の次はapi/server.jsの作業手順➃へ移動し、完了後にこのファイルの作業手順➄へ戻ります。 -->
    <!-- 【作業手順➀】商品詳細を表示するModalを作る -->
    <!-- ① JavaScriptから取得できるように、商品詳細Modalのidを指定してください。 -->
    <div class="modal fade" id="xxxxx" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">商品詳細</h5>
                    <button type="button" data-bs-dismiss="modal" class="btn-close"></button>
                </div>

                <div class="modal-body">
                    <table>
                        <!-- ② 各商品情報の挿入先に、JavaScript側と対応するidを指定してください。 -->
                        <tr>
                            <th>商品番号</th>
                            <td id="xxxxx"></td>
                        </tr>
                        <tr>
                            <th>商品名</th>
                            <td id="xxxxx"></td>
                        </tr>
                        <tr>
                            <th>価格</th>
                            <td id="xxxxx"></td>
                        </tr>
                        <tr>
                            <th>カテゴリ</th>
                            <td id="xxxxx"></td>
                        </tr>
                    </table>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary">ボタン1</button>
                    <button type="button" class="btn btn-danger">ボタン2</button>
                    <button type="button" data-bs-dismiss="modal" class="btn btn-secondary">閉じる</button>
                </div>

            </div>
        </div>
    </div>
    <!-- ここまで【作業手順➀】です。 -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        //【作業手順➁】商品名をクリックできるようにする
        function showProductList(products) {
            let productList = document.getElementById('product_list');
            productList.innerHTML = '';

            products.forEach(product => {
                let productHtml = `
            <tr>
                <td>${product.id}</td>
                <td>
                    <!-- ③ 商品名をクリックした時、showProductDetail関数へ商品IDを渡してください。 -->
                    <a href="#" onclick="xxxxxxxx">
                        ${product.name}
                    </a>
                </td>
                <td>${product.price}</td>
                <td>${product.category}</td>
            </tr>`;
                productList.insertAdjacentHTML('beforeend', productHtml);
            });
        }

        //【作業手順③】商品詳細APIを呼び出す
        // ④ 作業手順➁から呼び出される関数名を記述し、商品IDを受け取ってください。
        function xxxxx(xx) {
            // ⑤ 受け取った商品IDをURLに入れ、1件分の商品詳細を取得してください。
            axios.get(`http://localhost:3005/api/v421/products/${xx}`)
                .then(response => {
                    //【作業手順➄】取得した商品情報をModalへ表示する
                    // api/server.jsの作業手順➃を完成させてから、ここへ戻って実装してください。
                    // ⑪ APIから返された1件分の商品情報を取得してください。
                    let product = response.xxx;

                    // ⑫ 作業手順➀で用意した各表示場所へ、対応する商品情報を挿入してください。
                    document.getElementById('xxxxx').innerHTML = product.xxx;
                    document.getElementById('xxxxx').innerHTML = product.xxx;
                    document.getElementById('xxxxx').innerHTML = product.xxx;
                    document.getElementById('xxxxx').innerHTML = product.xxx;

                    // ⑬ 商品情報を挿入した後、作業手順➀で作ったModalを表示してください。
                    let modal = new bootstrap.Modal(document.getElementById('xxxxx'));
                    modal.xxx();
                })
                .catch(error => console.error('エラーが発生しました:', error));
        }

        //3.3学習した初期リスト表示の呼び出し関数
        document.addEventListener('DOMContentLoaded', function () {
            getProductList();
        });
        //3.4学習したキーワード検索の呼び出し関数
        document.getElementById('searchBtn').addEventListener('click', function () {
            let name = document.getElementById('searchName').value;

            axios.get(`http://localhost:3005/api/v421/products?keyword=${name}`)
                .then(response => {
                    showProductList(response.data);
                })
                .catch(error => console.error('エラーが発生しました:', error));
        });
        //3.4学習した一覧表示の呼び出し関数
        document.getElementById('listBtn').addEventListener('click', function () {
            getProductList();
        });

        function getProductList() {
            axios.get('http://localhost:3005/api/v421/products')
                .then(response => {
                    showProductList(response.data);
                })
                .catch(error => console.error('エラーが発生しました:', error));
        }
    </script>
</body>

</html>
