<!DOCTYPE html>
<html>
<head>
    <title>商品登録</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <meta charset="UTF-8">
</head>

<body>
    <h1>商品管理システム</h1>

    <table>
        <thead>
            <tr>
                <th>商品番号</th>
                <th>商品名</th>
                <th>価格</th>
                <th>カテゴリ</th>
            </tr>
        </thead>
        <tbody id="product_list">
            <!--ここにデータが挿入されます-->
        </tbody>
    </table>

    <!-- 【作業手順①】登録フォームのHTML要素を確認します。 -->
    <h2>データ登録</h2>
    商品名：<input type="text" id="inputName"><br>
    価　格：<input type="number" id="inputPrice"><br>
    <button id="registBtn">登録</button>

<script>
// 【作業手順②】登録ボタンがクリックされた時の処理を作ります。
// ➀ 登録ボタンの正しいidを指定してください。
document.getElementById('xxxx').addEventListener('click', function() {
    // ➁ 商品名と価格の入力値を取得してください。
    let name = document.getElementById('xxxxx').value;
    let price = document.getElementById('xxxxx').value;

    // ➂ POST方式で登録APIへ送信してください。
    axios.xxx('http://localhost:3005/api/v341/products', {
        name: xxx,
        price: xxx
    })

    // 【作業手順④】api/server.jsの「3-4-1 商品登録API」の問題を解いてから戻ってください。
    .then(response => {
        alert('商品が登録されました');
        // ➃ 登録後に返ってきた一覧データを画面に表示してください。
        xxxxx(response.data);
    })
    .catch(error => console.error('商品登録に失敗しました:', error));
});

//========この下は、既存のコードです。========
document.addEventListener('DOMContentLoaded', function() {
    axios.get('http://localhost:3005/api/v341/products')
    .then(response => {
        showProductList(response.data);
    })
    .catch(error => console.error('エラーが発生しました:', error));
});

function showProductList(products){
    let productList = document.getElementById('product_list');
    productList.innerHTML = '';

    products.forEach(product => {
        let productHtml = `
        <tr>
            <td>${product.id}</td><td>${product.name}</td><td>${product.price}</td><td>${product.category}</td>
        </tr>`;
        productList.insertAdjacentHTML('beforeend', productHtml);
    });
}
</script>
</body>
</html>
